name: Build image

on:
  workflow_dispatch:
    inputs:
      rclone_version:
        description: "rclone tag, branch, or commit to build"
        required: true
        default: "v1.74.2"
      rclone_patch_urls:
        description: "Patch URLs to apply before building rclone; separate by comma or whitespace; leave empty for upstream only"
        required: false
        default: "https://github.com/rclone/rclone/pull/9399.patch"
      go_version:
        description: "Go version used by the rclone builder stage"
        required: true
        default: "1.25"
      platforms:
        description: "Docker target platforms"
        required: true
        default: "linux/amd64,linux/arm64"
      image_tag:
        description: "Image tag; leave empty to derive from rclone version and patch"
        required: false
        default: ""
      tag_latest:
        description: "Also tag and push this image as latest"
        required: true
        type: boolean
        default: true

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io

jobs:
  build:
    name: Build and push
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Prepare image metadata
        id: vars
        shell: bash
        env:
          RCLONE_VERSION: ${{ inputs.rclone_version }}
          RCLONE_PATCH_URLS: ${{ inputs.rclone_patch_urls }}
          IMAGE_TAG: ${{ inputs.image_tag }}
          PLATFORMS: ${{ inputs.platforms }}
        run: |
          image="ghcr.io/${GITHUB_REPOSITORY,,}"
          patch_urls="$(printf '%s' "$RCLONE_PATCH_URLS" | tr ',;\n\r\t' '     ' | xargs)"

          version_slug="${RCLONE_VERSION#refs/tags/}"
          version_slug="${version_slug#v}"
          version_slug="$(printf '%s' "$version_slug" | sed -E 's/[^A-Za-z0-9_.-]+/-/g')"

          patch_slug=""
          if [ -n "$patch_urls" ]; then
            non_pr_patch=false
            for patch_url in $patch_urls; do
              if [[ "$patch_url" =~ /pull/([0-9]+) ]]; then
                patch_slug="${patch_slug}-pr${BASH_REMATCH[1]}"
              else
                non_pr_patch=true
              fi
            done
            if [ "$non_pr_patch" = "true" ]; then
              patch_slug="${patch_slug}-patched"
            fi
          fi

          tag="$IMAGE_TAG"
          if [ -z "$tag" ]; then
            tag="rclone-${version_slug}${patch_slug}"
          fi

          {
            echo "image=$image"
            echo "tag=$tag"
            echo "rclone_version=$RCLONE_VERSION"
            echo "rclone_patch_urls=$patch_urls"
            echo "go_version=${{ inputs.go_version }}"
            echo "platforms=$PLATFORMS"
          } >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.vars.outputs.image }}
          tags: |
            type=raw,value=${{ steps.vars.outputs.tag }}
            type=raw,value=latest,enable=${{ inputs.tag_latest }}
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.rclone.version=${{ steps.vars.outputs.rclone_version }}
            org.opencontainers.image.rclone.patch-urls=${{ steps.vars.outputs.rclone_patch_urls }}

      - name: Build and push image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: ${{ steps.vars.outputs.platforms }}
          push: true
          build-args: |
            GO_VERSION=${{ steps.vars.outputs.go_version }}
            RCLONE_VERSION=${{ steps.vars.outputs.rclone_version }}
            RCLONE_PATCH_URLS=${{ steps.vars.outputs.rclone_patch_urls }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Print image
        run: |
          echo "Image: ${{ steps.vars.outputs.image }}:${{ steps.vars.outputs.tag }}"
          echo "Latest tag enabled: ${{ inputs.tag_latest }}"
          echo "Digest: ${{ steps.build.outputs.digest }}"
