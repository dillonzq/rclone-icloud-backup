services:
  rclone-icloud-backup:
    image: ghcr.io/dillonzq/rclone-icloud-backup:latest
    container_name: rclone-icloud-backup
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - TZ=${TZ:-Europe/Berlin}
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      - UMASK=${UMASK:-022}
      - CHOWN_RECURSIVE=${CHOWN_RECURSIVE:-false}
      - APPLE_ID=${APPLE_ID}
      - APPLE_PASSWORD=${APPLE_PASSWORD:-}
      - APPLE_PASSWORD_OBSCURED=${APPLE_PASSWORD_OBSCURED:-}
      - RCLONE_REMOTE=${RCLONE_REMOTE:-icloudphotos}
      - RCLONE_CONFIG_DIR=${RCLONE_CONFIG_DIR:-/config/rclone}
      - RCLONE_CONFIG=${RCLONE_CONFIG:-/config/rclone/rclone.conf}
      - RCLONE_CACHE_DIR=${RCLONE_CACHE_DIR:-/cache/rclone}
      - ICLOUD_SERVICE=${ICLOUD_SERVICE:-photos}
      - ICLOUD_REGION=${ICLOUD_REGION:-global}
      - BACKUP_DIR=${BACKUP_DIR:-/data/backup}
      - RCLONE_SOURCE=${RCLONE_SOURCE:-}
      - INIT_AUTO=${INIT_AUTO:-false}
      - SORT_BY_DATE=${SORT_BY_DATE:-true}
      - DRY_RUN=${DRY_RUN:-false}
      - MAX_TRANSFER=${MAX_TRANSFER:-}
      - BACKUP_INTERVAL_HOURS=${BACKUP_INTERVAL_HOURS:-6}
      - AUTH_CHECK_INTERVAL_MINUTES=${AUTH_CHECK_INTERVAL_MINUTES:-60}
      - FIRST_BACKUP_DELAY_MINUTES=${FIRST_BACKUP_DELAY_MINUTES:-5}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID}
    volumes:
      # Local backup target – change left side to your desired path
      - ./backup:/data/backup
      # rclone config persistence (stores trust token, cookies, password)
      - ./rclone-config:/config/rclone
      # rclone cache for fast subsequent runs (metadata caching)
      - ./rclone-cache:/cache/rclone
